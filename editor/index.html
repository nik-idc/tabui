  <body>
    <div class="header">
      <h1>TabUI Demo</h1>
      <p>
        This is a demo of a guitar tab editor library. This is still an early,
        unfinished version. While the editor is currently embedded directly in
        this page, it can be fully integrated into any JavaScript or TypeScript
        project once a dynamic template builder is added.
      </p>
      <a href="https://github.com/nik-idc/tabui">GitHub Repo</a>
    </div>
    <div id="tabui-editor">
      <script src="./main.ts" type="module" defer></script>
    </div>
  </body>
